<body>
  {{> mainContainer}}
</body>

<template name="mainContainer">
  <div class="app">
    <header>
      <div class="app-bar">
        <div class="app-header">
          <h1>📝️ To Do List {{#if isUserLogged}}{{incompleteCount}}{{/if}}</h1>
        </div>
      </div>
    </header>

    <div class="main">
      {{#if isUserLogged}}
        <div class="user">
          {{getUser.username}} 🚪
        </div>

        {{> form }}

        <div class="filter">
          <button id="hide-completed-button">
            {{#if hideCompleted}}
              Show All
            {{else}}
              Hide Completed
            {{/if}}
          </button>
        </div>

        <div class="category-filter">
          <span class="category-filter-label">Category:</span>
          {{#each categoryFilters}}
            <button
              class="category-filter-button {{#if isActive}}active{{/if}}"
              data-category="{{value}}"
            >
              {{label}}
            </button>
          {{/each}}
        </div>

        {{#if isLoading}}
          <div class="loading">loading...</div>
        {{/if}}

        <ul class="tasks">
          {{#each tasks}}
            {{> task}}
          {{/each}}
        </ul>
      {{else}}
        {{> login }}
      {{/if}}
    </div>
  </div>
</template>

<template name="form">
  <form class="task-form">
    <input type="text" name="text" placeholder="Type to add new tasks" />
    <select name="category" class="category-select" aria-label="Task category">
      {{#each categories}}
        <option value="{{this}}">{{this}}</option>
      {{/each}}
    </select>
    <button type="submit">Add Task</button>
  </form>
</template>
