<template name="login">
  <form class="login-form">
    <div>
      <label for="username">Username</label>
      <input
        type="text"
        placeholder="Username"
        name="username"
        required
      />
    </div>

    <div>
      <label for="password">Password</label>
      <input
        type="password"
        placeholder="Password"
        name="password"
        required
      />
    </div>
    <div>
      <button type="submit">Log In</button>
    </div>
    {{#if errorMessage}}
      <p class="login-error">{{errorMessage}}</p>
    {{/if}}
  </form>
</template>
